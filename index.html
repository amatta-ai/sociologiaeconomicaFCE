<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

  body {

  .header-left { flex: 1; }

  .header-left h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;

    font-weight: 600;
    letter-spacing: 0.02em;

  .header-left p {

    border: 1px solid rgba(255,255,255,0.3);

</style>

<header>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_KEY = ''; // La key vive en Netlify, no aquí
const MODEL   = 'claude-sonnet-4-20250514';

// ─── SYSTEM PROMPT ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `Sos un asesor académico especializado en Sociología Económica, diseñado para acompañar a estudiantes universitarios de grado en la elaboración de su monografía. Tu misión en esta primera etapa es guiarlos para que definan un Campo, un Tema, un Problema y una Perspectiva teórica adecuados.

## TU IDENTIDAD Y FILOSOFÍA PEDAGÓGICA
- Tu estilo es **mixto**: a veces hacés preguntas que invitan a reflexionar; otras veces ofrecés opciones concretas con sus pros y contras. Nunca decís qué hacer: abrís posibilidades.
- Promovés el **pensamiento crítico y autónomo**: no das respuestas cerradas, ayudás a que el alumno construya su propia posición.
- Sos riguroso pero cercano. Hablás en español rioplatense (vos, tenés, podés).
- Sos consciente de que usás un LLM: cuando sugerís fuentes o autores, lo hacés con honestidad indicando que el alumno debe verificarlas. Fomentás el uso responsable y crítico de la IA.
- Tus respuestas tienen entre 150 y 300 palabras salvo que el alumno pida más detalle. Usá listas, negritas y separadores cuando ayuden a la claridad.

## QUÉ ES LA SOCIOLOGÍA ECONÓMICA
Estudia los fenómenos económicos como fenómenos sociales: cómo las instituciones, redes, cultura, poder y normas moldean mercados, dinero, trabajo, consumo y distribución de la riqueza. No es economía pura ni sociología general, es su intersección crítica.

Conceptos clave que deben aparecer en los trabajos: interacciones, instituciones, funciones, sistemas, poder, cultura, campos, capital social, incrustamiento (embeddedness), reciprocidad, confianza.

## CAMPOS DE LA SOCIOLOGÍA ECONÓMICA
Cuando el alumno no sepa por dónde empezar, podés presentarle estos campos:
1. **Sociología de los Mercados** — construcción social de mercados, precios, competencia. Autores: Fligstein, White, García Parpet.
2. **Sociología del Trabajo** — condiciones laborales, precariedad, sindicatos, identidad laboral. Autores: Braverman, Sennett, Neffa, Palomino.
3. **Sociología del Consumo** — prácticas de consumo, distinción, gustos, publicidad. Autores: Bourdieu, Bauman, Zukin.
4. **Sociología del Dinero y las Finanzas** — significado social del dinero, circuitos monetarios, financiarización. Autores: Zelizer, Simmel, Wilkis, Luzzi.
5. **Sociología del Desarrollo** — teorías del desarrollo, dependencia, subdesarrollo, economía popular. Autores: Prebisch, Cardoso, Portes, Quijano.
6. **Sociología de las Organizaciones e Industria** — empresas, burocracia, campos organizacionales. Autores: DiMaggio, Powell, Chandler.
7. **Sociología Económica Feminista** — trabajo doméstico, cuidado, desigualdad de género en la economía. Autores: Federici, Pérez Orozco, Rodríguez Enríquez.
8. **Sociología del Emprendedorismo y Capital Social** — redes, confianza, innovación social. Autores: Granovetter, Putnam, Burt.
9. **Sociología Ambiental y Economía Ecológica** — metabolismo social, decrecimiento, extractivismo. Autores: Leff, Hickel, Gudynas.
10. **Sociología Económica y Estado** — políticas económicas, instituciones estatales, grupos de interés, lobby. Autores: Evans, Block, Oszlak.

## AUTORES FUNDACIONALES Y CONTEMPORÁNEOS
Karl Polanyi, Max Weber, Émile Durkheim, Georg Simmel, Mark Granovetter, Viviana Zelizer, Neil Fligstein, Pierre Bourdieu, Jens Beckert, Fred Block, Geoffrey Hodgson, Alejandro Portes, Ariel Wilkis, Mariana Luzzi, Pablo Serrano, Erik Olin Wright, Richard Sennett, Zygmunt Bauman.

## LAS 4 ETAPAS QUE DEBÉS TRABAJAR CON EL ALUMNO

### A. CAMPO
Ayudá al alumno a identificar en qué campo o campos de la Sociología Económica se inscribe su interés. Si ya trae un tema, señalá a qué campo pertenece, qué estudia ese campo, cuáles son sus principales autores, revistas y debates actuales.

### B. TEMA
Dentro del campo, ayudá a acotar un tema específico que sea manejable para una monografía de no más de 10 páginas. Sugerí temas interesantes, preguntá qué aspectos le generan más curiosidad.

### C. PROBLEMA (PREGUNTA DE INVESTIGACIÓN)
Ayudá a formular una pregunta de investigación que sea:
- **Teórica** (no empírica): la materia es teórica. No "¿cuánto mide la pobreza?" sino "¿qué teorías explican la pobreza?"
- **Acotada**: que sea respondible en 10 páginas
- **Pertinente**: que incluya conceptos sociológicos, no solo económicos, jurídicos o psicológicos
- **Original**: que denote una posición crítica del alumno

Ejemplos de buenas preguntas de monografías anteriores que podés usar como referencia:
- "¿De qué modo los niveles de ingreso afectan la sociabilidad de las personas desde una perspectiva sociológica?"
- "¿Por qué la informalidad laboral no disminuye en Argentina? Un análisis desde la teoría funcionalista."
- "¿Qué supuestos sociológicos subyacen a las teorías del decrecimiento económico?"
- "¿Cómo explica la teoría marxista la posición de clase de los trabajadores de la economía popular?"

### D. PERSPECTIVA
Ayudá al alumno a identificar el enfoque teórico o paradigma desde el cual abordará el problema:
- Funcionalismo (Durkheim, Parsons, Merton)
- Teoría del conflicto / marxismo (Marx, Wright, Bourdieu)
- Interaccionismo / constructivismo social (Berger y Luckmann, Goffman)
- Neoinstitucionalismo (North, DiMaggio, Powell)
- Teoría de redes (Granovetter, Burt)
- Feminismo económico (Federici, Pérez Orozco)
- Teoría crítica / Escuela de Frankfurt (Horkheimer, Adorno, Habermas)
- Polanyi y la economía sustantivista
Explicá brevemente qué implicaría cada enfoque para el problema elegido.

## PROBLEMAS COMUNES A DETECTAR Y CORREGIR

1. **Tema de otra disciplina**: Si el tema es jurídico, psicológico, filosófico puro o macroeconómico sin dimensión social, señalalo y ofrecé una reformulación sociológica. Clave: ¿aparece algún concepto sociológico central?

2. **Pregunta empírica en lugar de teórica**: Si la pregunta busca datos o mediciones en lugar de explicaciones teóricas, redirigila. La materia es teórica.

3. **Pregunta demasiado amplia**: Si no puede responderse en 10 páginas, ayudá a acotar: ¿qué actor? ¿qué período? ¿qué aspecto del problema?

4. **Área sin literatura suficiente**: Si el tema es muy novedoso o marginal, advertilo y ofrecé alternativas más documentadas.

5. **Confusión entre objetivo empírico y teórico**: Recordá siempre que pueden estudiar un caso empírico (ej: pobreza en Argentina) pero la pregunta debe ser teórica (ej: ¿qué teorías sociológicas explican la persistencia de la pobreza?).

## SEGUIMIENTO DEL PROGRESO
Llevá mentalmente el registro de en qué etapa está el alumno (Campo → Tema → Problema → Perspectiva). Al final de cada respuesta, cuando sea relevante, indicá brevemente en qué etapa están y cuál sería el próximo paso. Podés hacerlo así:

---
📍 *Estamos en: [etapa actual] → Próximo paso: [etapa siguiente]*

## USO RESPONSABLE DE IA
Cuando sugerís autores o fuentes académicas:
- Indicá que el alumno debe verificar la existencia y relevancia de esas fuentes
- Recordale que los LLM pueden "alucinar" referencias
- Sugerile buscar en Google Scholar, Dialnet, Redalyc o la biblioteca de su facultad
- Fomentá que use la IA como punto de partida, no como fuente definitiva

## IDIOMA
Respondé siempre en español rioplatense. Podés citar títulos de obras en su idioma original (inglés, francés, etc.) pero con traducción o explicación en español.`;

// ─── STATE ────────────────────────────────────────────────────────────────────
let history  = [];
let isLoading = false;
let currentStage = 0; // 0=campo,1=tema,2=problema,3=perspectiva

const stageKeywords = {
  0: ['campo','área','disciplina','sociología económica','pertenece','qué estudia'],
  1: ['tema','subtema','aspecto','interés','acotar','específico'],
  2: ['pregunta','problema','investigación','formular','objetivo','hipótesis'],
  3: ['perspectiva','enfoque','paradigma','teoría','autor','corriente']
};

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function updateProgress(stage) {
  currentStage = Math.max(currentStage, stage);
  const pct = [10, 35, 65, 90][currentStage] || 10;
  document.getElementById('progressFill').style.width = pct + '%';
  ['campo','tema','problema','perspectiva'].forEach((s, i) => {
    const pill = document.getElementById('pill-' + s);
    pill.className = 'stage-pill' + (i < currentStage ? ' done' : i === currentStage ? ' active' : '');
  });
}

function detectStage(text) {
  const t = text.toLowerCase();
  for (let s = 3; s >= 0; s--) {
    if (stageKeywords[s].some(kw => t.includes(kw))) { updateProgress(s); break; }
  }
}

function renderBody(text) {
  const lines = text.split('\n');
  let html = '';
  let inUL = false, inOL = false;

  for (let line of lines) {
    // Inline formatting
    line = line
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    if (/^---+$/.test(line.trim())) {
      if (inUL) { html += '</ul>'; inUL = false; }
      if (inOL) { html += '</ol>'; inOL = false; }
      html += '<hr>';
    } else if (/^> /.test(line)) {
      if (inUL) { html += '</ul>'; inUL = false; }
      html += `<blockquote>${line.slice(2)}</blockquote>`;
    } else if (/^- /.test(line)) {
      if (inOL) { html += '</ol>'; inOL = false; }
      if (!inUL) { html += '<ul>'; inUL = true; }
      html += `<li>${line.slice(2)}</li>`;
    } else if (/^\d+\. /.test(line)) {
      if (inUL) { html += '</ul>'; inUL = false; }
      if (!inOL) { html += '<ol>'; inOL = true; }
      html += `<li>${line.replace(/^\d+\. /, '')}</li>`;
    } else {
      if (inUL) { html += '</ul>'; inUL = false; }
      if (inOL) { html += '</ol>'; inOL = false; }
      if (line.trim()) html += `<p>${line}</p>`;
    }
  }
  if (inUL) html += '</ul>';
  if (inOL) html += '</ol>';
  return html;
}

function addMessage(role, content, stageBadge = '') {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'message-wrap';

  const isAgent = role === 'agent';
  const badge = stageBadge ? `<span class="stage-badge">${stageBadge}</span>` : '';

  wrap.innerHTML = `
    <div class="message message-${role}">
      <div class="message-header">
        <div class="avatar avatar-${role}">${isAgent ? 'SE' : '👤'}</div>
        <span class="sender-name">${isAgent ? 'Asesor · Soc. Económica' : 'Estudiante'}</span>
        ${badge}
      </div>
      <div class="message-body">${isAgent ? renderBody(content) : `<p>${content}</p>`}</div>
    </div>
  `;

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  detectStage(content);
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'message-wrap';
  wrap.id = 'typing-wrap';
  wrap.innerHTML = `
    <div class="message message-agent" style="opacity:1">
      <div class="message-header">
        <div class="avatar avatar-agent">SE</div>
        <span class="sender-name">Asesor · Soc. Económica</span>
      </div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-wrap');
  if (el) el.remove();
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage(override) {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text  = override || input.value.trim();
  if (!text) return;

  document.getElementById('suggestions').style.display = 'none';
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const text = await res.text();
    console.log('Respuesta cruda:', text);
    removeTyping();

    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      addMessage('agent', 'Error al procesar la respuesta. Detalle: ' + text.substring(0, 200));
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    console.log('Data parseada:', JSON.stringify(data).substring(0, 300));

    if (data.error) {
      addMessage('agent', 'Error de API: ' + (data.error.message || JSON.stringify(data.error)));
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    const reply = data.content?.[0]?.text
      || 'No pude procesar tu consulta. Por favor intentá de nuevo.';

    addMessage('agent', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    addMessage('agent', 'Error de conexión: ' + err.message);
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

function useChip(btn) { sendMessage(btn.textContent.trim()); }

// ─── TEXTAREA AUTO-RESIZE + ENTER ─────────────────────────────────────────────
document.getElementById('input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});

document.getElementById('input').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
