<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asesor de Monografías — Sociología Económica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #222118;
    --border: #2e2c26;
    --accent: #c9a84c;
    --accent-dim: #8a6e2f;
    --text: #e8e2d4;
    --text-muted: #7a7568;
    --text-dim: #4a4840;
    --user-bg: #1e1c14;
    --agent-bg: #161513;
    --scrollbar: #2a2820;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-icon {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
    letter-spacing: 0.03em;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    background: #5a9e6f;
    border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

  .message-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .message {
    margin-bottom: 28px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-header {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 8px;
  }

  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .avatar-agent {
    background: var(--accent);
    color: #0f0e0c;
  }

  .avatar-user {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .sender-name {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .message-body {
    padding: 14px 18px;
    border-radius: 2px 8px 8px 8px;
    font-size: 0.95rem;
    line-height: 1.75;
  }

  .message-agent .message-body {
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
  }

  .message-user .message-body {
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px 2px 8px 8px;
  }

  .message-body strong {
    color: var(--accent);
    font-weight: 600;
  }

  .message-body em {
    color: #b8ad96;
    font-style: italic;
  }

  .message-body ul {
    margin: 10px 0 10px 18px;
  }

  .message-body li {
    margin-bottom: 5px;
  }

  .message-body p + p {
    margin-top: 10px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 2px 8px 8px 8px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--accent-dim);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input area */
  footer {
    border-top: 1px solid var(--border);
    padding: 16px 24px 20px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.93rem;
    line-height: 1.6;
    padding: 11px 14px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 160px;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent-dim);
  }

  textarea::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  button#sendBtn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #0f0e0c;
    cursor: pointer;
    font-size: 16px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  button#sendBtn:hover { background: #d4b05a; }
  button#sendBtn:active { transform: scale(0.95); }
  button#sendBtn:disabled { background: var(--text-dim); cursor: not-allowed; }

  .input-hint {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 8px;
    font-style: italic;
  }

  /* Suggestion chips */
  .suggestions {
    max-width: 760px;
    margin: 0 auto 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 24px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.78rem;
    padding: 5px 13px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    transition: all 0.2s;
  }

  .chip:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: var(--surface);
  }

  /* Divider */
  .day-divider {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 8px 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
    padding: 0 24px;
  }
  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">📖</div>
  <div class="header-text">
    <h1>Asesor de Monografías</h1>
    <p>Sociología Económica · Nivel de Grado</p>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    En línea
  </div>
</header>

<div id="chat">
  <div class="message-wrap">
    <div class="day-divider">Inicio de sesión</div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="chip" onclick="useChip(this)">¿Qué es la Sociología Económica?</button>
  <button class="chip" onclick="useChip(this)">Quiero escribir sobre mercados</button>
  <button class="chip" onclick="useChip(this)">¿El dinero es un tema válido?</button>
  <button class="chip" onclick="useChip(this)">Temas sobre desigualdad</button>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="input" placeholder="Escribí tu pregunta o el tema que tenés en mente…" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint">Presioná Enter para enviar · Shift+Enter para nueva línea</div>
</footer>

<script>
const SYSTEM_PROMPT = `Sos un asesor académico especializado en Sociología Económica para estudiantes universitarios de grado. Tu rol es ayudarlos a elegir y delimitar un tema de monografía que sea genuinamente pertinente a la Sociología Económica.

## Tu identidad y estilo
- Sos riguroso pero accesible. Usás un tono cálido y socrático: hacés preguntas que guían al alumno a pensar, no simplemente dás respuestas.
- Hablás en español rioplatense (vos, tenés, etc.).
- Sos entusiasta de la disciplina y transmitís esa pasión.
- Tus respuestas son claras, estructuradas y no demasiado largas. Usá listas cuando ayuden.

## ¿Qué es la Sociología Económica?
La Sociología Económica estudia los fenómenos económicos como fenómenos sociales: analiza cómo las instituciones, las redes sociales, la cultura, el poder y las normas moldean los mercados, el dinero, el trabajo, el consumo y la distribución de la riqueza. No es economía pura ni sociología general, sino su intersección.

Autores fundacionales y contemporáneos clave:
- **Karl Polanyi** (incrustamiento social de la economía, La Gran Transformación)
- **Max Weber** (ética protestante, racionalización económica, sociología de la dominación)
- **Émile Durkheim** (división del trabajo, solidaridad)
- **Mark Granovetter** (redes sociales y acción económica, "La fuerza de los lazos débiles")
- **Viviana Zelizer** (sociología del dinero, circuitos económicos, "El significado social del dinero")
- **Neil Fligstein** (campos como mercados, sociología de los mercados)
- **Pierre Bourdieu** (capital económico, social y cultural; campos)
- **Jens Beckert** (imaginarios económicos, expectativas, mercados)
- **Fred Block** (economías posindustriales, Estado y mercado)
- **Geoffrey Hodgson** (institucionalismo económico)
- **Alejandro Portes** (economía informal, capital social en América Latina)
- **Pablo Serrano / Ariel Wilkis / Mariana Luzzi** (sociología económica argentina, dinero popular)

## Temas que SÍ pertenecen a la Sociología Económica
- Mercados y su construcción social
- Redes sociales en la actividad económica (confianza, reciprocidad)
- Sociología del dinero y las finanzas
- Economía informal y popular
- Trabajo, precariedad y mercado laboral
- Consumo como práctica social
- Instituciones económicas (bancos, empresas, Estado)
- Desigualdad económica desde una perspectiva sociológica
- Emprendedurismo y capital social
- Economía solidaria y cooperativismo
- Globalización económica y sus efectos sociales
- Moralidad y economía

## Temas que NO pertenecen (y cómo redirigir)
- Temas puramente macroeconómicos sin dimensión social → orientar hacia el actor social detrás
- Temas de sociología pura sin conexión económica → preguntar qué dimensión económica queremos explorar
- Temas de administración o gestión empresarial → redirigir hacia las relaciones sociales en ese contexto
- Ensayos políticos sobre el sistema capitalista sin anclaje empírico o teórico sociológico → pedir precisión

## Tu comportamiento
1. Cuando un alumno mencione un tema, evaluá si es pertinente a la Sociología Económica.
2. Si ES pertinente: celebralo, ayudalo a delimitarlo mejor (¿qué aspecto? ¿qué actor? ¿qué contexto geográfico/temporal?), y sugerí 2-3 autores clave para ese subtema.
3. Si NO ES pertinente: explicá con amabilidad por qué se aleja de la disciplina, y ofrecé una reformulación que SÍ encaje en Sociología Económica.
4. Si el tema es AMBIGUO: hacé preguntas para entender mejor el enfoque que quiere darle el alumno.
5. Siempre terminá con una pregunta o invitación a seguir explorando.

## Formato de respuesta
- Usá **negrita** para destacar conceptos clave y nombres de autores.
- Usá listas con guion para sugerencias o autores.
- Máximo 250 palabras por respuesta, salvo que el alumno pida más detalle.
- No uses emojis excesivos. Podés usar alguno ocasional si suma calidez.`;

let history = [];
let isLoading = false;

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>(\n|$))+/g, match => `<ul>${match}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[ul])/gm, '')
    .split('\n').map(line => {
      if (line.startsWith('<ul>') || line.startsWith('</ul>') || line.startsWith('<li>')) return line;
      if (line.trim() === '') return '';
      return line;
    }).join('\n');
}

function addMessage(role, content, animate = true) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'message-wrap';

  const msg = document.createElement('div');
  msg.className = `message message-${role}`;
  if (!animate) msg.style.animation = 'none', msg.style.opacity = 1;

  const isAgent = role === 'agent';
  const avatarClass = isAgent ? 'avatar-agent' : 'avatar-user';
  const avatarText = isAgent ? 'SE' : 'Vos';
  const senderName = isAgent ? 'Asesor · Sociología Económica' : 'Estudiante';

  // Format content
  let formattedContent = content;
  const lines = content.split('\n');
  let html = '';
  let inList = false;

  for (let line of lines) {
    line = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
    if (line.startsWith('- ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${line.slice(2)}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim()) html += `<p>${line}</p>`;
    }
  }
  if (inList) html += '</ul>';

  msg.innerHTML = `
    <div class="message-header">
      <div class="avatar ${avatarClass}">${isAgent ? '📚' : '👤'}</div>
      <span class="sender-name">${senderName}</span>
    </div>
    <div class="message-body">${html}</div>
  `;

  wrap.appendChild(msg);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'message-wrap';
  wrap.id = 'typing-wrap';

  wrap.innerHTML = `
    <div class="message message-agent" style="opacity:1">
      <div class="message-header">
        <div class="avatar avatar-agent">📚</div>
        <span class="sender-name">Asesor · Sociología Económica</span>
      </div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-wrap');
  if (el) el.remove();
}

async function sendMessage(overrideText) {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = overrideText || input.value.trim();
  if (!text) return;

  // Hide chips after first message
  document.getElementById('suggestions').style.display = 'none';

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 
      'Content-Type': 'application/json',
      'x-api-key': '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',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'Lo siento, no pude procesar tu consulta. Intentá de nuevo.';
    addMessage('agent', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    addMessage('agent', 'Hubo un error de conexión. Por favor, verificá tu conexión e intentá de nuevo.');
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

function useChip(btn) {
  sendMessage(btn.textContent);
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// Enter to send
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Initial greeting
window.addEventListener('load', () => {
  setTimeout(() => {
    const greeting = `¡Hola! Soy tu asesor para la elección del tema de monografía en **Sociología Económica**.

Mi rol es ayudarte a encontrar un tema que sea riguroso, pertinente a la disciplina y que te resulte genuinamente interesante.

La **Sociología Económica** estudia los fenómenos económicos como fenómenos sociales: cómo las redes, las instituciones, la cultura y el poder moldean mercados, dinero, trabajo y consumo.

¿Por dónde querés empezar? Podés contarme:
- Un tema o área que te llame la atención
- Una pregunta que te estés haciendo
- O si querés, te propongo algunas ideas para explorar juntos`;

    addMessage('agent', greeting);
    history.push({ role: 'assistant', content: greeting });
  }, 400);
});
</script>
</body>
</html>
